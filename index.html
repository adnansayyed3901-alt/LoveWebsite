<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Ayesha ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
}

/* ========== HEART FLYING ANIMATION (CENTER SE) ========== */
#heart-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:1;
}

.fly-heart{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:fly 5s linear forwards;
}

@keyframes fly{
    0%{
        transform:translate(-50%,-50%) scale(0.4);
        opacity:1;
    }
    100%{
        transform:translate(
            calc(-50% + var(--x)),
            calc(-50% + var(--y))
        ) scale(1.2);
        opacity:0;
    }
}

/* ========== COMMON PAGE ========== */
.page{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:5;
    transition:transform 1s ease, opacity .6s ease;
}

/* ========== PAGE 1 ========== */
.page1{
    background: radial-gradient(circle, #ff9a9e, #fad0c4);
}
.page1.hide{
    opacity:0;
    pointer-events:none;
}

/* CENTER HEART */
.center-box{
    position:relative;
    width:220px;
    height:220px;
}

.big-heart{
    position:absolute;
    top:50%;
    left:50%;
    width:160px;
    height:160px;
    background:#ff0033;
    transform:translate(-50%,-50%) rotate(-45deg);
    animation:beat 1s infinite;
}

.big-heart::before,
.big-heart::after{
    content:"";
    position:absolute;
    width:160px;
    height:160px;
    background:#ff0033;
    border-radius:50%;
}
.big-heart::before{ top:-80px; left:0; }
.big-heart::after{ left:80px; top:0; }

.start-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:#ff0033;
    font-size:22px;
    font-weight:bold;
    padding:12px 32px;
    border-radius:40px;
    cursor:pointer;
    z-index:10;
    box-shadow:0 0 20px rgba(255,255,255,.9);
}

@keyframes beat{
    0%,100%{ transform:translate(-50%,-50%) rotate(-45deg) scale(1); }
    50%{ transform:translate(-50%,-50%) rotate(-45deg) scale(1.12); }
}

/* ========== PAGE 2 ========== */
.page2{
    background: linear-gradient(to top, #ff758c, #ff7eb3);
    transform:translateY(100%);
    flex-direction:column;
}
.page2.show{
    transform:translateY(0);
}

.page2 h1{
    color:white;
    font-size:32px;
    text-align:center;
}

.show-btn{
    margin-top:40px;
    background:white;
    color:#ff0055;
    font-size:20px;
    font-weight:bold;
    padding:14px 40px;
    border:none;
    border-radius:50px;
    cursor:pointer;
}

/* ========== PAGE 3 ========== */
.page3{
    background: radial-gradient(circle, #ffdde1, #ee9ca7);
    transform:translateY(100%);
    flex-direction:column;
}
.page3.show{
    transform:translateY(0);
}

.lyric{
    font-size:26px;
    color:#b8003c;
    margin:12px 0;
    opacity:0;
    animation:lyricFade 1.2s ease forwards;
}

.lyric::before{
    content:"❤️ ";
}

@keyframes lyricFade{
    from{ opacity:0; transform:translateY(20px); }
    to{ opacity:1; transform:translateY(0); }
}
</style>
</head>

<body>

<!-- 🔊 AUDIO (START CLICK PE CHALEGA) -->
<audio id="bgVoice" loop>
    <source src="voice/song.mp3" type="audio/mpeg">
</audio>

<!-- ❤️ HEART ANIMATION LAYER -->
<div id="heart-layer"></div>

<!-- PAGE 1 -->
<div class="page page1" id="page1">
    <div class="center-box">
        <div class="big-heart"></div>
        <div class="start-btn" onclick="openPage2()">START</div>
    </div>
</div>

<!-- PAGE 2 -->
<div class="page page2" id="page2">
    <h1>
        Ayesha <br>
        this lines dedicate to you ❤️
    </h1>
    <button class="show-btn" onclick="openPage3()">SHOW</button>
</div>

<!-- PAGE 3 -->
<div class="page page3" id="page3">
    <div class="lyric" style="animation-delay:0.3s">
        Teri nazron ka dil pe hua hai asar
    </div>
    <div class="lyric" style="animation-delay:1.6s">
        Tu mera mehboob hai jaana
    </div>
    <div class="lyric" style="animation-delay:2.9s">
        Teri ulfat mein jeeta har pal
    </div>
    <div class="lyric" style="animation-delay:4.2s">
        Tu ik tohfa hai Khuda ka
    </div>
</div>

<script>
/* ❤️ HEART FLYING – CONTINUOUS */
const layer = document.getElementById("heart-layer");
setInterval(()=>{
    const h = document.createElement("div");
    h.className = "fly-heart";
    h.innerHTML = "❤️";
    h.style.setProperty("--x",(Math.random()*600-300)+"px");
    h.style.setProperty("--y",(Math.random()*600-300)+"px");
    h.style.fontSize = Math.random()*18 + 18 + "px";
    layer.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},200);

/* 🎵 SONG – 100% WORKING */
const audio = document.getElementById("bgVoice");

function openPage2(){
    audio.volume = 1;
    audio.play();   // USER CLICK → browser allow
    page1.classList.add("hide");
    page2.classList.add("show");
}

function openPage3(){
    page3.classList.add("show");
}
</script>

</body>
</html>
